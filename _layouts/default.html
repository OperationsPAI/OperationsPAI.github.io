<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | truncatewords: 50 }}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9672;</text></svg>">
</head>
<body>
  {% include header.html %}

  <main id="main-content">
    {% if page.layout == 'default' %}
    <article class="content">
      {{ content }}
    </article>
    {% else %}
    {{ content }}
    {% endif %}
  </main>

  {% include footer.html %}

  <!-- Mermaid: only load if page contains mermaid blocks -->
  <script>
    if (document.querySelector('code.language-mermaid')) {
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js';
      s.onload = function() {
        document.querySelectorAll('code.language-mermaid').forEach(function(el) {
          var pre = el.parentElement;
          var div = document.createElement('div');
          div.className = 'mermaid';
          div.textContent = el.textContent;
          pre.parentElement.replaceChild(div, pre);
        });
        mermaid.initialize({ theme: 'base', themeVariables: {
          primaryColor: '#F5F0E8', primaryBorderColor: '#B8860B',
          primaryTextColor: '#2C2825', lineColor: '#B8860B',
          secondaryColor: '#EDE6D8', tertiaryColor: '#FDFBF7',
          fontFamily: 'Inter, sans-serif'
        }});
      };
      document.body.appendChild(s);
    }
  </script>
</body>
</html>
