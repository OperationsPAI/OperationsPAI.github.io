# Site configuration
title: OperationsPAI
description: >-
  Building the Future of Root Cause Analysis Together.
  An open-source community building the world's first self-evolving
  training environment for Root Cause Analysis in microservices.

# Site URL
url: https://operationspai.github.io
baseurl: ""

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-relative-links
  - jekyll-readme-index

# Include files
include:
  - README.md
  - ROADMAP.md
  - CONTRIBUTING.md
  - GOVERNANCE.md
  - CODE_OF_CONDUCT.md
  - docs

# Exclude files
exclude:
  - .git
  - .github
  - "*.gemspec"
